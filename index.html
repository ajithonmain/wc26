<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>World Cup 26</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6A2B" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WC26" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- SEO -->
    <meta name="description" content="Follow every match of the 2026 FIFA World Cup live — scores, groups, knockout bracket and alerts." />

    <!-- Capture PWA install prompt before React mounts — avoids race condition -->
    <script>
      window.__pwaPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
      });
    </script>

    <!-- Theme init — runs before paint to avoid flash -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('wc26:ui') || '{}');
        var t = (s.state && s.state.theme) ||
          (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
